name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # The content trust gate. Fails the build on any charter or schema violation.
      - run: npm run validate
      # The entity ledger must match what the day files actually reference.
      - run: npm run sync -- --check
      - run: npm test
      - run: npm run build
